name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @jetbay/api prisma:generate

      - name: Build API
        run: pnpm --filter @jetbay/api build

      - name: Build Admin
        run: pnpm --filter @jetbay/admin build

      - name: Build Web
        run: pnpm --filter @jetbay/web build

      - name: API unit tests
        run: pnpm --filter @jetbay/api test --passWithNoTests

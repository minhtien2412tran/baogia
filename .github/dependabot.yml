# Keep npm deps patched — JetBay monorepo
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-deps:
        dependency-type: development
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - ci
      - dependencies

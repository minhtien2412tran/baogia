packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAge: 0
verifyDepsBeforeRun: false
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - prisma
  - sharp
  - unrs-resolver

packages:
  - 'apps/*'
  - 'packages/*'
overrides:
  js-yaml: 4.3.0
  lodash: 4.18.1
  multer: 2.2.0
  postcss: 8.5.20
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAge: 0
verifyDepsBeforeRun: false
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - prisma
  - sharp
  - unrs-resolver

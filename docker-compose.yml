version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jta-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: jta_user
      POSTGRES_PASSWORD: jta_password
      POSTGRES_DB: jta_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: jta-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: jta-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  mailpit:
    image: axllent/mailpit:v1.15
    container_name: jta-mailpit
    ports:
      - '1025:1025' # SMTP port
      - '8025:8025' # Web UI port
    restart: always

volumes:
  postgres_data:
  redis_data:
  minio_data:

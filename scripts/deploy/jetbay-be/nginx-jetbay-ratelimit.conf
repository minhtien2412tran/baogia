# JetBay / JetVina — shared Nginx rate-limit zones (http context)
# Install: copy to /etc/nginx/conf.d/jetbay-ratelimit.conf then nginx -t && reload
#
# Used by api.minhtien.online.ssl.conf location blocks.

limit_req_zone $binary_remote_addr zone=jetbay_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=jetbay_quotes:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=jetbay_newsletter:10m rate=10r/m;

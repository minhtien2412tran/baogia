# JetBay public web — www.minhtien.online → 127.0.0.1:3012
upstream jetbay_web_upstream {
    server 127.0.0.1:3012;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.minhtien.online minhtien.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://www.minhtien.online$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.minhtien.online;

    ssl_certificate /etc/letsencrypt/live/www.minhtien.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.minhtien.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 16m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://jetbay_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# apex → www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minhtien.online;

    ssl_certificate /etc/letsencrypt/live/www.minhtien.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.minhtien.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://www.minhtien.online$request_uri;
}

# Jet-Bay API Docs — docs.minhtien.online
# Proxies ONLY swagger/openapi/health to jetbay-be (127.0.0.1:3010)
# Does NOT touch api.baotienweb.cloud or other backends.

upstream jetbay_docs_upstream {
    server 127.0.0.1:3010;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name docs.minhtien.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.minhtien.online;

    ssl_certificate /etc/letsencrypt/live/docs.minhtien.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.minhtien.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 8m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Docs surface only
    location = / {
        return 302 /swagger;
    }

    location = /health {
        proxy_pass http://jetbay_docs_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger {
        proxy_pass http://jetbay_docs_upstream/swagger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://jetbay_docs_upstream/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.yaml {
        proxy_pass http://jetbay_docs_upstream/openapi.yaml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block everything else on docs subdomain
    location / {
        return 404;
    }
}
